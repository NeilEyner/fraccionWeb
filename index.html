<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Matematicas Aventura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos extra solo para el mapa */
    .map-footer {
      padding: 0 20px 40px;
      max-width: 440px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .topics-strip {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 16px 20px;
      background: rgba(255,255,255,.55);
      border-radius: 999px;
      border: 2px dashed var(--border);
    }
    .topics-strip .topic-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: clamp(.9rem, 2.5vw, 1.1rem);
    }
    .topic-pill svg { width: 18px; height: 18px; }
    .tp-mint  { background: var(--mint);  color: var(--mint-shadow);  }
    .tp-coral { background: var(--coral); color: var(--coral-shadow); }
    .tp-lav   { background: var(--lav);   color: var(--lav-shadow);   }
    .map-tagline {
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      color: var(--text-mid);
      font-weight: 600;
    }
  </style>
</head>
<body class="map-page page-index">

  <!-- ══════ HERO ══════ -->
  <header class="map-hero">
    <div class="map-hero-icon" aria-hidden="true">
      <i data-lucide="graduation-cap"></i>
    </div>
    <h1 class="t-display anim-up">Matematicas<br /><span style="color:var(--mint-mid)">Aventura</span></h1>
    <p class="t-body anim-up delay-1">Aprende Sumas, Restas y Fracciones</p>
  </header>

  <!-- ══════ TEMAS DISPONIBLES ══════ -->
  <div style="padding: 0 20px; max-width:640px; margin: 0 auto 10px;">
    <div class="topics-strip anim-up delay-2">
      <div class="topic-pill tp-mint">
        <i data-lucide="plus-circle"></i>Sumas
      </div>
      <div class="topic-pill tp-coral">
        <i data-lucide="minus-circle"></i>Restas
      </div>
      <div class="topic-pill tp-lav">
        <i data-lucide="divide-circle"></i>Fracciones
      </div>
    </div>
  </div>

  <!-- ══════ MAPA ZIGZAG ══════ -->
  <main class="map-container" role="main" aria-label="Camino de aprendizaje">

    <!-- PARADA 1: VIDEOS (IZQUIERDA) -->
    <div class="map-row row-left anim-up delay-2">
      <a href="videos.html" class="map-node mn-mint pulse-node" aria-label="Ir a Videos">
        <div class="mn-icon" aria-hidden="true"><i data-lucide="video"></i></div>
        <span class="mn-label">Videos</span>
        <div class="mn-badge" aria-hidden="true">1</div>
      </a>
      <div class="touch-hint" aria-hidden="true">
        <i data-lucide="hand"></i>
        <span>Toca aqui</span>
      </div>
    </div>

    <!-- CONECTOR 1→2 (izquierda a derecha) -->
    <div class="map-conn conn-rl conn-mint" aria-hidden="true"></div>

    <!-- PARADA 2: TEORIA (DERECHA) -->
    <div class="map-row row-right anim-up delay-3">
      <div class="touch-hint touch-hint-rev" aria-hidden="true">
        <i data-lucide="hand"></i>
        <span>Toca aqui</span>
      </div>
      <a href="teoria.html" class="map-node mn-sky" aria-label="Ir a Teoria">
        <div class="mn-icon" aria-hidden="true"><i data-lucide="book-open"></i></div>
        <span class="mn-label">Teoria</span>
        <div class="mn-badge" aria-hidden="true">2</div>
      </a>
    </div>

    <!-- CONECTOR 2→3 (derecha a izquierda) -->
    <div class="map-conn conn-lr conn-sky" aria-hidden="true"></div>

    <!-- PARADA 3: JUEGOS (IZQUIERDA) -->
    <div class="map-row row-left anim-up delay-4">
      <a href="juegos.html" class="map-node mn-cream" aria-label="Ir a Juegos">
        <div class="mn-icon" aria-hidden="true"><i data-lucide="gamepad-2"></i></div>
        <span class="mn-label">Juegos</span>
        <div class="mn-badge" aria-hidden="true">3</div>
      </a>
      <div class="touch-hint" aria-hidden="true">
        <i data-lucide="hand"></i>
        <span>Toca aqui</span>
      </div>
    </div>

    <!-- CONECTOR 3→4 (izquierda a derecha) -->
    <div class="map-conn conn-rl conn-cream" aria-hidden="true"></div>

    <!-- PARADA 4: EJERCICIOS (DERECHA) -->
    <div class="map-row row-right anim-up delay-5">
      <div class="touch-hint touch-hint-rev" aria-hidden="true">
        <i data-lucide="hand"></i>
        <span>Toca aqui</span>
      </div>
      <a href="ejercicios.html" class="map-node mn-coral" aria-label="Ir a Ejercicios">
        <div class="mn-icon" aria-hidden="true"><i data-lucide="pencil-line"></i></div>
        <span class="mn-label">Ejercicios</span>
        <div class="mn-badge" aria-hidden="true">4</div>
      </a>
    </div>

  </main>

  <!-- ══════ PIE ══════ -->
  <footer class="map-footer" role="contentinfo">
    <p class="map-tagline">
      Sigue el camino y conviertete en un experto en matematicas
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
